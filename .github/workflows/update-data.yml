name: Update dashboard data

# Refreshes data/countries.json (bonus reference) and appends a daily
# wealth snapshot to data/wealth.json. Uses only PUBLIC game APIs — no
# secrets, no token required.

on:
  schedule:
    - cron: "20 23 * * *"   # daily at 23:20 UTC
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write            # needed to commit the refreshed data

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data
        run: python scripts/update_data.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/countries.json data/wealth.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
